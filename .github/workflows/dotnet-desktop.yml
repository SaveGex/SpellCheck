name: .NET API CI

on:
  push:
    branches: [ "master", "ci/fix-workflow" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Create .env file
      run: |
        echo "MSSQL_SA_PASSWORD=${{ secrets.MSSQL_SA_PASSWORD }}" >> .env
        echo "MSSQL_DATABASE=${{ secrets.MSSQL_DATABASE }}" >> .env
        echo "MSSQL_USER=${{ secrets.MSSQL_USER }}" >> .env
        echo "MSSQL_USER_PASSWORD=${{ secrets.MSSQL_SA_PASSWORD }}" >> .env
        echo "JWT__SecretKey=${{ secrets.JWT__SecretKey }}" >> .env
        echo "APIAdministrator__Email=${{ secrets.APIAdministrator__Email }}" >> .env
        echo "APIAdministrator__Password=${{ secrets.APIAdministrator__Password }}" >> .env
        echo "APIAdministrator__Client__Id=${{ secrets.APIAdministrator__Client__Id }}" >> .env
        echo "APIAdministrator__Client__Name=${{ secrets.APIAdministrator__Client__Name }}" >> .env
        echo "APIAdministrator__Client__URL=${{ secrets.APIAdministrator__Client__URL }}" >> .env

    - name: Generate connection string
      run: |
        source .env
        CONN="Server=localhost,1433;Database=${MSSQL_DATABASE};User Id=${MSSQL_USER};Password=${MSSQL_USER_PASSWORD};TrustServerCertificate=True"
        echo "CONNECTIONSTRINGS__DEFAULTCONNECTION=${CONN}" >> .env
        echo "ConnectionStrings__DefaultConnection=${CONN}" >> $GITHUB_ENV

    - name: Override docker-compose for CI
      run: |
        cat > docker-compose.override.yml << EOF
        services:
          dbmanagerapi:
            volumes: []
            environment:
              Logging__FileLogger__IsActive: "false"
        EOF

    - name: Start services
      run: docker compose up -d --build

    - name: Wait for SQL Server healthy
      run: |
        for i in {1..30}; do
          STATUS=$(docker inspect --format='{{.State.Health.Status}}' sql2025 2>/dev/null)
          [ "$STATUS" = "healthy" ] && echo "SQL Server ready!" && break
          echo "Attempt $i — status: $STATUS"
          sleep 3
        done

    - name: Wait for API healthy
      run: |
        for i in {1..20}; do
          curl -sf http://localhost:8080/health && break
          echo "Waiting for API..."
          sleep 3
        done

    - name: Setup .NET 10 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.x.x

    - name: Restore
      run: dotnet restore SpellCheck.sln

    - name: Build
      run: dotnet build SpellCheck.sln --configuration Release --no-restore

    - name: Run tests
      run: dotnet test SpellCheck.sln --configuration Release --no-build --logger "trx;LogFileName=test_results.trx" --results-directory ./TestResults
      env:
        ConnectionStrings__DefaultConnection: "Server=localhost,1433;Database=TestDb;User Id=testuser;Password=${{ secrets.MSSQL_SA_PASSWORD }};TrustServerCertificate=True"
        Logging__FileLogger__IsActive: "false"

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: ./TestResults

    - name: Tear down
      if: always()
      run: docker compose down -v