name: .NET API CI\CD

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [ "master", "ci/fix-workflow" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Create build directory
      run: mkdir build

    - name: Checkout
      uses: actions/checkout@v4
      with:
        path: src

    - name: Setup .NET 10 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.x.x

    - name: Restore
      run: dotnet restore SpellCheck.sln
      working-directory: src

    - name: Build Solution
      run: dotnet build SpellCheck.sln --configuration Release --no-restore -o /tmp/build/solution
      working-directory: src

    - name: Build Tests project
      run: dotnet publish Tests/Tests.csproj --configuration Release --no-restore -o /tmp/build/tests
      working-directory: src
    
    - name: Copy Solution to build/solution directory
      run: rsync -a /tmp/build/solution/ ./build/solution/

    - name: Copy Tests to build directory
      run: rsync -a /tmp/build/tests/ ./build/tests/

    - name: Call setup-env action
      uses: ./src/.github/actions/setup-env
      with:
        secrets_json: ${{ toJson(secrets) }}
        env_path: build/config/.env

    - name: Upload build
      uses: actions/upload-artifact@v4
      with:
        name: publish
        path: build
    
  docker-compose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ["build"] # for configured env file

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        path: src
    
    - name: Download build
      uses: actions/download-artifact@v4
      with:
        name: publish
        path: build

    - name: Create .env depends on secrets
      uses: ./src/.github/actions/setup-env
      with:
        secrets_json: ${{ toJson(secrets) }}
        env_path: ./src/.env
    
    - name: Start services
      run: docker compose up -d --build
      working-directory: src

    - name: Wait for SQL Server healthy
      run: |
        for i in {1..30}; do
          STATUS=$(docker inspect --format='{{.State.Health.Status}}' sql2025 2>/dev/null)
          [ "$STATUS" = "healthy" ] && echo "SQL Server ready!" && break
          echo "Attempt $i — status: $STATUS"
          sleep 3
        done

    - name: Wait for API healthy
      run: |
        for i in {1..30}; do
          curl -sf http://localhost:8080/health && break
          echo "$i: Waiting for API..."
          sleep 3
        done
    
    - name: Tear down
      if: always()
      run: docker compose down -v
      working-directory: src

  tests:
    runs-on: ubuntu-latest
    needs: ["build"]

    steps:

    - name: Download build
      uses: actions/download-artifact@v4
      with:
        name: publish
        path: build

    - name: Run tests
      run: dotnet test ./build/tests/Tests.dll --logger "trx;LogFileName=test_results.trx" --results-directory ../TestResults
      env:
        ConnectionStrings__DefaultConnection: "Server=localhost,1433;Database=TestDb;User Id=testuser;Password=${{ secrets.MSSQL_SA_PASSWORD }};TrustServerCertificate=True"

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: ./TestResults
      
  deploy:
    runs-on: ubuntu-latest
    needs: ["build", "tests", "docker-compose"]

    steps:
      - uses: actions/checkout@v4

      - name: Login to ghcr.io container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Convert repository name to lowercase
        run: echo "REPOSITORY_LOWERCASE=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and Push docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./DbManagerApi/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPOSITORY_LOWERCASE }}:latest
